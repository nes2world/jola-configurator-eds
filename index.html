<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Anna Draped Top — PDP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="/scripts/aem.js" type="module"></script>
  <script src="/scripts/scripts.js" type="module"></script>
  <link rel="stylesheet" href="/styles/styles.css">
  <style>
    /* PDP two-column layout */
    .pdp-layout {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 24px;
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 36px;
      align-items: start;
    }

    @media (width <= 768px) {
      .pdp-layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header></header>
  <main>
    <!--
      PDP with real Venia sample data.
      In da.live: two blocks in a section, each with the Commerce SKU.
      product-details renders the sidebar, furniture-viewer the 3D canvas.
      They communicate via pdp/* events.
    -->
    <div class="pdp-layout">
      <div class="furniture-viewer">
        <div><div>VT04</div></div>
      </div>

      <div class="product-details">
        <div><div>VT04</div></div>
      </div>
    </div>
  </main>
  <footer></footer>
</body>
</html>
